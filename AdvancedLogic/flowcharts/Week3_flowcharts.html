<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AdvancedLogic — Week 3: Argument Game Proof Theories and Dialogues</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar {
  width: 268px;
  min-width: 268px;
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
.sb-module {
  font-size: 0.67rem;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
  margin-bottom: 4px;
}
.sb-week  { font-size: 0.76rem; color: #8b949e; margin-bottom: 2px; }
.sb-title { font-size: 0.96rem; font-weight: 700; color: #f0f6fc; line-height: 1.35; }
.sb-count {
  display: inline-block;
  background: #21262d;
  color: #8b949e;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
  border: 1px solid #30363d;
}

#chart-list { padding: 8px 6px; flex: 1; overflow-y: auto; }
#chart-list::-webkit-scrollbar { width: 3px; }
#chart-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

.chart-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.1s;
  color: #8b949e;
  user-select: none;
  border: 1px solid transparent;
}
.chart-item:hover { background: #21262d; color: #c9d1d9; }
.chart-item.active {
  background: #1f3a6e;
  color: #f0f6fc;
  border-color: #388bfd;
}
.chart-item.active .ci-type { color: #79c0ff; opacity: 1; }
.ci-icon  { font-size: 0.95rem; flex-shrink: 0; margin-top: 2px; }
.ci-title { font-size: 0.83rem; font-weight: 600; line-height: 1.3; }
.ci-type  { font-size: 0.66rem; opacity: 0.6; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.07em; }

/* ── Main ────────────────────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#chart-header {
  padding: 13px 22px 11px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
#chart-title-el { font-size: 1rem; font-weight: 700; color: #79c0ff; margin-bottom: 2px; }
#chart-desc-el  { font-size: 0.81rem; color: #8b949e; font-style: italic; }

#diagram-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0d1117;
  background-image:
    radial-gradient(circle at 1px 1px, #21262d 1px, transparent 0);
  background-size: 24px 24px;
}

#diagram-svg { width: 100%; height: 100%; display: block; cursor: grab; }
#diagram-svg:active { cursor: grabbing; }

/* ── Zoom controls ───────────────────────────────────────────────────────── */
#zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 10;
}
.zoom-btn {
  width: 32px;
  height: 32px;
  border: 1px solid #30363d;
  background: #161b22;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: all 0.1s;
  color: #8b949e;
}
.zoom-btn:hover { background: #21262d; color: #79c0ff; border-color: #388bfd; }

/* ── Hint bar ────────────────────────────────────────────────────────────── */
#hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  color: #484f58;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.2s;
}
#hint.hidden { opacity: 0; }

.state-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #484f58;
  font-size: 0.9rem;
  text-align: center;
  pointer-events: none;
}
.state-msg.err { color: #f85149; }

/* ── Info panel (slides in from the left of the diagram area) ──────────── */
#info-panel {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 440px;
  max-width: 50vw;
  background: #161b22;
  border-right: 1px solid #30363d;
  z-index: 30;
  transform: translateX(-100%);
  transition: transform 0.26s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: 12px 0 32px rgba(0, 0, 0, 0.45);
}
#info-panel.visible { transform: translateX(0); }

#info-panel-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
  position: relative;
}
#info-panel-header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
#info-node-badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 11px;
  border-radius: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  display: inline-block;
}
#info-node-label {
  font-size: 1.25rem;
  font-weight: 700;
  color: #f0f6fc;
  line-height: 1.35;
  word-break: break-word;
}

.badge-decision { background: #2d2209; color: #e3b341; border: 1px solid #d29922; }
.badge-step     { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-start    { background: #0d1f38; color: #79c0ff; border: 1px solid #388bfd; }
.badge-success  { background: #0d1f12; color: #56d364; border: 1px solid #3fb950; }
.badge-failure  { background: #1c0f0e; color: #ff7b72; border: 1px solid #f85149; }
.badge-topic    { background: #1a1036; color: #c084fc; border: 1px solid #a371f7; }
.badge-subtopic { background: #0d2020; color: #2dd4bf; border: 1px solid #14b8a6; }

#info-close {
  width: 30px;
  height: 30px;
  border: 1px solid #30363d;
  background: #0d1117;
  border-radius: 6px;
  cursor: pointer;
  color: #8b949e;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.1s;
}
#info-close:hover { background: #21262d; color: #f0f6fc; border-color: #8b949e; }

#info-panel-body {
  padding: 20px 24px 24px;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: #30363d transparent;
}
#info-panel-body::-webkit-scrollbar { width: 6px; }
#info-panel-body::-webkit-scrollbar-track { background: transparent; }
#info-panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
#info-panel-body::-webkit-scrollbar-thumb:hover { background: #484f58; }

#info-section-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: #6e7681;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
#info-note-text {
  font-size: 1rem;
  color: #c9d1d9;
  line-height: 1.75;
}
#info-note-text.empty {
  color: #484f58;
  font-style: italic;
}
</style>
</head>

    <div class="sb-count"  id="sb-count"></div>

</div>

<div id="main">
  <div id="chart-header">
    <div id="chart-title-el">Select a chart</div>
    <div id="chart-desc-el"></div>
  </div>
  <div id="diagram-area">
    <svg id="diagram-svg"></svg>
    <div id="zoom-controls">
      <button class="zoom-btn" id="btn-zi" title="Zoom in">+</button>
      <button class="zoom-btn" id="btn-zo" title="Zoom out">−</button>
      <button class="zoom-btn" id="btn-zr" title="Fit to view">⊙</button>
    </div>
    <div id="hint">Scroll to zoom · Drag to pan · Click a node for details</div>
    <div id="info-panel">
      <div id="info-panel-header">

          <button id="info-close" title="Close (Esc)">✕</button>

      <div id="info-panel-body">
        <div id="info-section-label">Explanation</div>
        <div id="info-note-text"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// DATA
// ═════════════════════════════════════════════════════════════════════════════
const DATA = {"module": "AdvancedLogic", "week": 3, "title": "Argument Game Proof Theories and Dialogues", "charts": [{"id": "chart-1", "type": "mindmap", "title": "Topic Map", "description": "High-level overview of argument game proof theories, winning strategies, and the generalisation to dialogues for distributed reasoning.", "nodes": [{"id": "root", "label": "Week 3\nArgument Games", "note": "Week 3 introduces argument games as an alternative to computing labellings directly. Two players exchange attacking arguments to test whether a given argument is in the grounded or preferred labelling."}, {"id": "recap", "label": "Recap\nLabellings", "note": "An AF labelling assigns IN, OUT, or UN to each argument. The grounded labelling is the most sceptical (smallest IN set); preferred labellings maximise the IN set."}, {"id": "game", "label": "Argument\nGame Idea", "note": "Two players (PRO and OPP) take turns playing arguments that attack the previous one. PRO defends the initial argument; OPP tries to defeat it."}, {"id": "ground", "label": "Grounded\nGame", "note": "The grounded game tests membership in the grounded labelling. Its key restriction is that PRO cannot repeat any argument in a single dispute."}, {"id": "pref", "label": "Preferred\nGame", "note": "The preferred game tests membership in some preferred labelling. OPP cannot repeat, and the winning strategy must contain no mutually attacking PRO arguments."}, {"id": "win", "label": "Winning\nStrategies", "note": "A winning strategy is a subtree of the game tree where every OPP node has all children, every PRO node has at least one child, and every leaf is a node where OPP is stuck."}, {"id": "dialog", "label": "Dialogues\n(LO3 non-exam)", "note": "Argument games generalise to multi-agent dialogues with shared locutions like claim, why, and argue. Each dialogue defines an implicit AF over its locution graph."}, {"id": "ai", "label": "AI Applications\n(LO4 non-exam)", "note": "Dialogue-based argumentation supports value alignment in AI systems. SocrAPPs use Socratic dialogue to foster critical thinking in users."}, {"id": "g3", "label": "Rule G3\nPRO no-repeat", "note": "In the grounded game, PRO cannot reuse an argument in the same dispute. This avoids cyclic support, matching the conservative grounded semantics."}, {"id": "p3", "label": "Rule P3\nOPP no-repeat", "note": "In the preferred game, OPP cannot reuse an argument in the same dispute. This makes OPP's task harder, matching the more credulous preferred semantics."}, {"id": "ws", "label": "WS Condition\n(no PRO conflict)", "note": "In a preferred winning strategy, no two PRO arguments may attack each other. This guarantees the strategy corresponds to a conflict-free set of arguments."}, {"id": "loc", "label": "Locutions\n& Protocols", "note": "A locution is a formalised utterance: claim(q), why(q), or argue(X,q). A dialogue protocol specifies which locutions are legal in response to others."}, {"id": "sc", "label": "Soundness &\nCompleteness", "note": "Combined SC theorem: a dialogue establishes claim(q) iff q is a non-monotonic inference from all the knowledge exchanged in the dialogue."}], "edges": [{"from": "root", "to": "recap"}, {"from": "root", "to": "game"}, {"from": "root", "to": "ground"}, {"from": "root", "to": "pref"}, {"from": "root", "to": "win"}, {"from": "root", "to": "dialog"}, {"from": "root", "to": "ai"}, {"from": "ground", "to": "g3"}, {"from": "pref", "to": "p3"}, {"from": "pref", "to": "ws"}, {"from": "dialog", "to": "loc"}, {"from": "dialog", "to": "sc"}]}, {"id": "chart-2", "type": "flowchart", "title": "Grounded Game Procedure", "description": "Step-by-step procedure for testing whether an argument X0 is in the grounded labelling using the grounded argument game.", "nodes": [{"id": "start", "label": "Test: is X0 in\ngrounded labelling?", "shape": "terminal", "variant": "start", "note": "We are given an AF and an argument X0 and want to use the grounded game to decide whether X0 is in the grounded labelling."}, {"id": "tree", "label": "Build complete\ngrounded game tree", "shape": "rect", "note": "Construct the full game tree rooted at X0, where PRO and OPP alternate moves and each move must attack the previous argument."}, {"id": "g3", "label": "Apply G3:\nPRO no-repeat", "shape": "rect", "note": "Prune branches where PRO would repeat an argument it already played in the same dispute. PRO is not allowed to reuse arguments."}, {"id": "list", "label": "List all disputes\n(root-to-leaf paths)", "shape": "rect", "note": "Enumerate every root-to-leaf path of the pruned game tree. Each path is a complete dispute that ends with one player being stuck."}, {"id": "subtree", "label": "Find subtree T'\nwhere PRO wins all", "shape": "rect", "note": "Look for a subtree T' that includes all children at OPP nodes and at least one child at PRO nodes, such that every leaf is a node where OPP cannot move."}, {"id": "exists", "label": "Such subtree\nexists?", "shape": "diamond", "note": "Check whether a winning strategy subtree was found. If yes, PRO has a winning strategy; otherwise no winning strategy exists."}, {"id": "in", "label": "X0 IS in\ngrounded labelling", "shape": "terminal", "variant": "success", "note": "PRO has a winning strategy, so by the soundness/completeness theorem X0 is in the grounded labelling of the AF."}, {"id": "out", "label": "X0 NOT in\ngrounded labelling", "shape": "terminal", "variant": "failure", "note": "PRO has no winning strategy, so X0 is not in the grounded labelling. It is either OUT or UN under the grounded semantics."}], "edges": [{"from": "start", "to": "tree"}, {"from": "tree", "to": "g3"}, {"from": "g3", "to": "list"}, {"from": "list", "to": "subtree"}, {"from": "subtree", "to": "exists"}, {"from": "exists", "to": "in", "label": "Yes"}, {"from": "exists", "to": "out", "label": "No"}]}, {"id": "chart-3", "type": "flowchart", "title": "Preferred Game Procedure", "description": "Step-by-step procedure for testing whether an argument X0 is in some preferred labelling using the preferred argument game.", "nodes": [{"id": "start", "label": "Test: is X0 in\nsome preferred labelling?", "shape": "terminal", "variant": "start", "note": "We are given an AF and an argument X0 and want to use the preferred game to decide whether X0 belongs to at least one preferred labelling."}, {"id": "tree", "label": "Build complete\npreferred game tree", "shape": "rect", "note": "Construct the full game tree rooted at X0, where PRO and OPP alternate moves and each move attacks the previous one."}, {"id": "p3", "label": "Apply P3:\nOPP no-repeat", "shape": "rect", "note": "Prune branches where OPP would repeat an argument it already played in the same dispute. PRO is allowed to repeat in the preferred game."}, {"id": "find", "label": "Find candidate\nwinning subtree T'", "shape": "rect", "note": "Look for a subtree where OPP nodes have all their children, PRO nodes have at least one child, and every leaf is a node where OPP cannot move."}, {"id": "ws", "label": "Check WS condition:\nno PRO/PRO attacks", "shape": "diamond", "note": "Verify that no two PRO arguments inside the candidate subtree attack each other. This ensures the strategy corresponds to a conflict-free set."}, {"id": "in", "label": "X0 IS in some\npreferred labelling", "shape": "terminal", "variant": "success", "note": "PRO has a valid winning strategy that satisfies the WS condition, so X0 belongs to at least one preferred labelling of the AF."}, {"id": "another", "label": "Another candidate\nsubtree available?", "shape": "diamond", "note": "If the WS condition fails, try a different candidate subtree before giving up. PRO can pick different responses at PRO nodes."}, {"id": "out", "label": "X0 NOT in any\npreferred labelling", "shape": "terminal", "variant": "failure", "note": "No valid winning strategy exists, so X0 is not in any preferred labelling. It is OUT or UN under every preferred labelling."}], "edges": [{"from": "start", "to": "tree"}, {"from": "tree", "to": "p3"}, {"from": "p3", "to": "find"}, {"from": "find", "to": "ws"}, {"from": "ws", "to": "in", "label": "Yes"}, {"from": "ws", "to": "another", "label": "No"}, {"from": "another", "to": "find", "label": "Yes"}, {"from": "another", "to": "out", "label": "No"}]}, {"id": "chart-4", "type": "flowchart", "title": "Grounded vs Preferred Game - Comparison", "description": "Side-by-side classification of the two argument games and their differences.", "nodes": [{"id": "games", "label": "Argument\nGames", "shape": "rect", "note": "Two-player turn-taking games used to decide whether an argument is in a target labelling. PRO defends, OPP attacks."}, {"id": "shared", "label": "Shared\nrules", "shape": "rect", "note": "Both games share the basic mechanics: PRO moves first, players alternate, and each move must attack the previous one."}, {"id": "g", "label": "Grounded\nGame", "shape": "rect", "note": "Designed to detect membership in the grounded (sceptical) labelling. PRO must not repeat itself in a dispute."}, {"id": "p", "label": "Preferred\nGame", "shape": "rect", "note": "Designed to detect membership in some preferred (credulous) labelling. OPP must not repeat itself, plus a no-mutual-PRO-attack condition."}, {"id": "g3", "label": "G3: PRO no-\nrepeat", "shape": "rect", "note": "PRO cannot reuse an argument in the same dispute. This blocks cyclic support and matches the most conservative semantics."}, {"id": "p3", "label": "P3: OPP no-\nrepeat", "shape": "rect", "note": "OPP cannot reuse an argument in the same dispute. PRO is allowed to repeat, which matches the more credulous preferred semantics."}, {"id": "ws", "label": "WS: no two PRO\nargs attack", "shape": "rect", "note": "Extra condition on the preferred winning strategy. Ensures the set of PRO arguments is conflict-free, as required by preferred labellings."}, {"id": "result", "label": "Result:\nLabelling", "shape": "rect", "note": "If PRO has a winning strategy, the initial argument is in the corresponding labelling (grounded or some preferred)."}, {"id": "alt", "label": "PRO/OPP\nalternation", "shape": "rect", "note": "PRO and OPP take turns, with PRO playing the initial argument as the first move and each subsequent move attacking the previous one."}], "edges": [{"from": "games", "to": "shared"}, {"from": "games", "to": "g"}, {"from": "games", "to": "p"}, {"from": "shared", "to": "alt"}, {"from": "g", "to": "g3"}, {"from": "p", "to": "p3"}, {"from": "p", "to": "ws"}, {"from": "g", "to": "result"}, {"from": "p", "to": "result"}]}, {"id": "chart-5", "type": "flowchart", "title": "Identifying a Winning Strategy", "description": "Procedure for extracting a winning strategy subtree from a complete game tree.", "nodes": [{"id": "start", "label": "Have complete\ngame tree", "shape": "terminal", "variant": "start", "note": "We start with the full pruned game tree rooted at the initial PRO argument and want to find a subtree that constitutes a winning strategy."}, {"id": "leaves", "label": "Identify all\nleaves", "shape": "rect", "note": "Look at every leaf of the game tree. A leaf is a node where the player whose turn it is cannot make any further move."}, {"id": "stuck", "label": "Each leaf:\nwhich player stuck?", "shape": "diamond", "note": "For each leaf, decide whether OPP or PRO is the one who has no move. PRO wins disputes ending where OPP is stuck."}, {"id": "ok", "label": "Mark dispute\nas PRO-win", "shape": "rect", "note": "OPP cannot move at this leaf, so PRO wins the dispute. This dispute can be part of a winning strategy."}, {"id": "no", "label": "Mark dispute\nas PRO-lose", "shape": "rect", "note": "PRO cannot move at this leaf, so PRO loses the dispute. Any winning strategy must avoid this branch via different PRO choices."}, {"id": "build", "label": "Build subtree T':\nat OPP nodes keep ALL children;\nat PRO nodes keep ONE child", "shape": "rect", "note": "Construct the candidate subtree by always including every child at OPP nodes (OPP can play any move) but choosing only one child at PRO nodes (PRO picks a response)."}, {"id": "all", "label": "All leaves of T'\nare PRO-wins?", "shape": "diamond", "note": "Check every leaf of the candidate subtree. If any leaf is a PRO-loss, this is not a winning strategy and PRO must choose differently."}, {"id": "yes", "label": "Winning strategy\nfound", "shape": "terminal", "variant": "success", "note": "Every dispute in the subtree is won by PRO so the subtree is a valid winning strategy. The initial argument is in the target labelling."}, {"id": "retry", "label": "Try different\nPRO choices", "shape": "rect", "note": "Backtrack at PRO nodes and try other children. If no choice produces a winning subtree, no winning strategy exists."}], "edges": [{"from": "start", "to": "leaves"}, {"from": "leaves", "to": "stuck"}, {"from": "stuck", "to": "ok", "label": "OPP stuck"}, {"from": "stuck", "to": "no", "label": "PRO stuck"}, {"from": "ok", "to": "build"}, {"from": "no", "to": "build"}, {"from": "build", "to": "all"}, {"from": "all", "to": "yes", "label": "Yes"}, {"from": "all", "to": "retry", "label": "No"}, {"from": "retry", "to": "build"}]}]};

// TEXT MEASUREMENT
// ═════════════════════════════════════════════════════════════════════════════
const _c = document.createElement('canvas').getContext('2d');
function measure(text, fs = 13, fw = '500') {
  _c.font = `${fw} ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
  const lines = String(text).split('\n');
  return {
    w: Math.max(...lines.map(l => _c.measureText(l).width)),
    h: lines.length * (fs * 1.45),
    lines,
  };
}

// SVG + ZOOM
// ═════════════════════════════════════════════════════════════════════════════
const svg   = d3.select('#diagram-svg');
const root  = svg.append('g').attr('id', 'root-layer');

const zoom = d3.zoom()
  .scaleExtent([0.04, 12])
  .on('zoom', ev => root.attr('transform', ev.transform));

svg.call(zoom)
   .on('dblclick.zoom', () => fitAll());

function fitAll() {
  const svgEl = svg.node();
  const W = svgEl.clientWidth  || 900;
  const H = svgEl.clientHeight || 600;
  const bb = root.node().getBBox();
  if (!bb.width || !bb.height) return;
  const scale = Math.min(0.88 * W / bb.width, 0.88 * H / bb.height, 4);
  const tx = W / 2 - (bb.x + bb.width  / 2) * scale;
  const ty = H / 2 - (bb.y + bb.height / 2) * scale;
  svg.transition().duration(380)
     .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

document.getElementById('btn-zi').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 1.45));
document.getElementById('btn-zo').addEventListener('click', () =>
  svg.transition().duration(220).call(zoom.scaleBy, 0.69));
document.getElementById('btn-zr').addEventListener('click', fitAll);

// ═════════════════════════════════════════════════════════════════════════════
// INFO PANEL
// ═════════════════════════════════════════════════════════════════════════════
const infoPanel = document.getElementById('info-panel');
const infoLabel = document.getElementById('info-node-label');
const infoBadge = document.getElementById('info-node-badge');
const infoNote  = document.getElementById('info-note-text');
const hintEl    = document.getElementById('hint');

function badgeFor(node, depth) {
  if (depth !== undefined) {
    // Mindmap node
    if (depth === 0) return { text: 'Root',      cls: 'badge-start' };
    if (depth === 1) return { text: 'Main Topic', cls: 'badge-topic' };
    return               { text: 'Sub-topic',   cls: 'badge-subtopic' };
  }
  if (node.shape === 'diamond')                    return { text: 'Decision',    cls: 'badge-decision' };
  if (node.shape === 'terminal' && node.variant === 'success') return { text: 'Success',    cls: 'badge-success'  };
  if (node.shape === 'terminal' && node.variant === 'failure') return { text: 'Failure',    cls: 'badge-failure'  };
  if (node.shape === 'terminal')                   return { text: 'Start / End', cls: 'badge-start'    };
  return                                                   { text: 'Step',       cls: 'badge-step'     };
}

function showInfo(node, depth) {
  const label = (node.label || '').replace(/\n/g, ' ');
  infoLabel.textContent = label;

  const b = badgeFor(node, depth);
  infoBadge.textContent  = b.text;
  infoBadge.className    = 'badge-class ' + b.cls; // reset then set

  if (node.note) {
    infoNote.textContent = node.note;
    infoNote.className   = '';
  } else {
    infoNote.textContent = 'No description available for this node.';
    infoNote.className   = 'empty';
  }

  infoPanel.classList.add('visible');
  hintEl.classList.add('hidden');
}

function hideInfo() {
  infoPanel.classList.remove('visible');
  hintEl.classList.remove('hidden');
}

document.getElementById('info-close').addEventListener('click', hideInfo);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideInfo(); });

// Click on SVG background closes panel
svg.on('click', (event) => {
  if (event.target === svg.node() || event.target.id === 'root-layer') hideInfo();
});

// SIDEBAR
// ═════════════════════════════════════════════════════════════════════════════
document.getElementById('sb-module').textContent = DATA.module;

document.getElementById('sb-title' ).textContent = DATA.title;

  DATA.charts.length + ' chart' + (DATA.charts.length !== 1 ? 's' : '');

const ICONS = { mindmap: '🧠', flowchart: '📊', graph: '🔗' };
const listEl = document.getElementById('chart-list');
let firstSel = null;

DATA.charts.forEach((chart, i) => {
  const el = document.createElement('div');
  el.className = 'chart-item';
  el.innerHTML =
    `<span class="ci-icon">${ICONS[chart.type] || '📋'}</span>
     <div>
       <div class="ci-title">${chart.title}</div>
       <div class="ci-type">${chart.type}</div>
     </div>`;

  listEl.appendChild(el);
  if (i === 0) firstSel = { chart, el };
});

// ═════════════════════════════════════════════════════════════════════════════
// SELECTION
// ═════════════════════════════════════════════════════════════════════════════
function selectChart(chart, itemEl) {
  document.querySelectorAll('.chart-item').forEach(e => e.classList.remove('active'));
  itemEl.classList.add('active');
  document.getElementById('chart-title-el').textContent = chart.title;
  document.getElementById('chart-desc-el' ).textContent = chart.description || '';

  root.selectAll('*').remove();

  if (chart.type === 'mindmap') renderMindmap(chart);
  else                          renderFlowchart(chart);
}

// ═════════════════════════════════════════════════════════════════════════════
// MINDMAP  (D3 radial tree)
// ═════════════════════════════════════════════════════════════════════════════
function renderMindmap(chart) {
  const svgW = svg.node().clientWidth  || 900;
  const svgH = svg.node().clientHeight || 600;
  const R    = Math.min(svgW, svgH) * 0.40;

  // Build parent-child map
  const byId  = Object.fromEntries(chart.nodes.map(n => [n.id, { ...n, _children: [] }]));
  const hasParent = new Set(chart.edges.map(e => e.to));
  chart.edges.forEach(e => { if (byId[e.from] && byId[e.to]) byId[e.from]._children.push(byId[e.to]); });
  const rootNode = chart.nodes.find(n => !hasParent.has(n.id)) || chart.nodes[0];

  // D3 hierarchy + radial tree
  const hier = d3.hierarchy(byId[rootNode.id], d => d._children.length ? d._children : null);
  d3.tree()
    .size([2 * Math.PI, R])
    .separation((a, b) => (a.parent === b.parent ? 1.2 : 2.4) / a.depth)
    (hier);

  // ── Defs: drop shadow ──────────────────────────────────────────────────────
  const defs = root.append('defs');
  const filt = defs.append('filter').attr('id', 'mm-shadow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%');
  filt.append('feDropShadow').attr('dx', 0).attr('dy', 2).attr('stdDeviation', 4).attr('flood-color', '#000').attr('flood-opacity', 0.5);

  // ── Group centered ─────────────────────────────────────────────────────────
  const grp = root.append('g').attr('transform', `translate(${svgW / 2},${svgH / 2})`);

  // ── Links ──────────────────────────────────────────────────────────────────
  const linkRadial = d3.linkRadial().angle(d => d.x).radius(d => d.y);

  grp.append('g').selectAll('path')
    .data(hier.links())
    .join('path')
    .attr('d', linkRadial)
    .attr('fill', 'none')
    .attr('stroke', d => C.levels[Math.min(d.target.depth - 1, C.levels.length - 1)])
    .attr('stroke-width', d => Math.max(1, 3 - d.target.depth * 0.8))
    .attr('opacity', 0.4)
    .attr('stroke-linecap', 'round');

  // ── Nodes ──────────────────────────────────────────────────────────────────
  const nodeG = grp.append('g').selectAll('g')
    .data(hier.descendants())
    .join('g')
    .attr('transform', d => {
      const a = d.x - Math.PI / 2;
      return `translate(${d.y * Math.cos(a)},${d.y * Math.sin(a)})`;
    })
    .style('cursor', 'default');

  nodeG.each(function(d) {
    const g      = d3.select(this);
    const depth  = d.depth;
    const label  = d.data.label || '';
    const color  = depth === 0 ? C.levels[0] : C.levels[Math.min(depth - 1, C.levels.length - 1)];
    const fs     = depth === 0 ? 15 : depth === 1 ? 12.5 : 11;
    const fw     = depth <= 1 ? '700' : '500';
    const m      = measure(label, fs, fw);
    const px     = depth === 0 ? 18 : 12;
    const py     = depth === 0 ? 12 : 8;
    const rw     = m.w + px * 2;
    const rh     = m.h + py * 2;

    if (depth === 0) {
      // Root: filled pill with glow
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', rh / 2)
        .attr('fill', color)
        .attr('filter', 'url(#mm-shadow)');
    } else {
      // Child: bordered pill
      g.append('rect')
        .attr('x', -rw / 2).attr('y', -rh / 2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', Math.min(rh / 2, 10))
        .attr('fill', color + '18')
        .attr('stroke', color)
        .attr('stroke-width', 1.5);
    }

    // Text
    m.lines.forEach((line, i) => {
      const yOff = (i - (m.lines.length - 1) / 2) * (fs * 1.45);
      g.append('text')
        .text(line)
        .attr('y', yOff)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', fs + 'px')
        .attr('font-weight', fw)
        .attr('fill', depth === 0 ? '#fff' : color)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // Hover + click
    const shapeEl = g.select(depth === 0 ? 'rect' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? d3.color(color).brighter(0.3) : color + '32');
      })
     .on('mouseleave', function() {
        shapeEl.transition().duration(120)
          .attr('fill', depth === 0 ? color : color + '18');
      })
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(d.data, depth);
      });
  });

  setTimeout(fitAll, 60);
}

// ═════════════════════════════════════════════════════════════════════════════
// FLOWCHART  (Dagre layout + custom D3 SVG)
// ═════════════════════════════════════════════════════════════════════════════
function renderFlowchart(chart) {
  const FS    = 13;
  const PX    = 22;
  const PY    = 13;
  const DPAD  = 1.5; // diamond size multiplier

  // ── Compute node sizes ────────────────────────────────────────────────────
  const info = {};
  chart.nodes.forEach(n => {
    const m  = measure(n.label || '', FS);
    let w    = Math.max(m.w + PX * 2, 90);
    let h    = Math.max(m.h + PY * 2, 38);
    if (n.shape === 'diamond') { w = (w + 20) * DPAD; h = (h + 10) * DPAD; }
    info[n.id] = { ...m, w, h };
  });

  // ── Dagre graph ───────────────────────────────────────────────────────────
  const gd = new dagre.graphlib.Graph({ multigraph: true });
  gd.setGraph({ rankdir: 'TB', nodesep: 55, ranksep: 75, marginx: 50, marginy: 50, edgesep: 20 });
  gd.setDefaultEdgeLabel(() => ({}));

  chart.nodes.forEach(n  => gd.setNode(n.id, { width: info[n.id].w, height: info[n.id].h }));
  chart.edges.forEach((e, i) => gd.setEdge(e.from, e.to, { label: e.label || '' }, 'e' + i));

  dagre.layout(gd);

  // ── Defs ──────────────────────────────────────────────────────────────────
  const defs  = root.append('defs');

  // Arrowhead
  defs.append('marker')
    .attr('id', 'arr').attr('viewBox', '0 -5 10 10')
    .attr('refX', 8).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', C.arrow);

  // Glow filter for highlighted nodes
  const glow = defs.append('filter').attr('id', 'glow').attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
  glow.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', '3').attr('result', 'blur');
  glow.append('feComposite').attr('in', 'SourceGraphic').attr('in2', 'blur').attr('operator', 'over');

  // ── Edges ─────────────────────────────────────────────────────────────────
  const edgeG = root.append('g').attr('class', 'edges');
  const lineGen = d3.line().curve(d3.curveCatmullRom.alpha(0.5))
    .x(d => d.x).y(d => d.y);

  gd.edges().forEach(e => {
    const ed  = gd.edge(e);
    if (!ed || !ed.points || ed.points.length < 2) return;
    const pts = ed.points;

    edgeG.append('path')
      .attr('d', lineGen(pts))
      .attr('fill', 'none')
      .attr('stroke', C.edge)
      .attr('stroke-width', 1.5)
      .attr('stroke-linecap', 'round')
      .attr('marker-end', 'url(#arr)');

    if (ed.label) {
      const mid = pts[Math.floor(pts.length / 2)];
      edgeG.append('text')
        .text(ed.label)
        .attr('x', mid.x + 6).attr('y', mid.y - 5)
        .attr('font-size', '11px')
        .attr('font-weight', '600')
        .attr('fill', C.edgeLabel)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    }
  });

  // ── Nodes ─────────────────────────────────────────────────────────────────
  const nodeG = root.append('g').attr('class', 'nodes');

  chart.nodes.forEach(n => {
    const pos    = gd.node(n.id);
    if (!pos) return;
    const ninfo  = info[n.id];
    const w      = pos.width;
    const h      = pos.height;
    const cx     = pos.x;
    const cy     = pos.y;

    // Pick colours
    let pal;
    if (n.shape === 'diamond')       pal = C.node.decision;
    else if (n.variant === 'success') pal = C.node.success;
    else if (n.variant === 'failure') pal = C.node.failure;
    else if (n.variant === 'start')   pal = C.node.start;
    else                              pal = C.node.default;

    const g = nodeG.append('g')
      .attr('transform', `translate(${cx - w/2},${cy - h/2})`)
      .style('cursor', 'default');

    // ── Shape ──────────────────────────────────────────────────────────────
    if (n.shape === 'diamond') {
      const hx = w / 2, hy = h / 2;
      g.append('polygon')
        .attr('points', `${hx},1 ${w-1},${hy} ${hx},${h-1} 1,${hy}`)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else if (n.shape === 'terminal') {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', h / 2)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    } else {
      g.append('rect')
        .attr('x', 0).attr('y', 0)
        .attr('width', w).attr('height', h)
        .attr('rx', 8)
        .attr('fill', pal.fill)
        .attr('stroke', pal.stroke)
        .attr('stroke-width', 1.5);
    }

    // ── Label ──────────────────────────────────────────────────────────────
    const textG = g.append('g').attr('transform', `translate(${w/2},${h/2})`);
    ninfo.lines.forEach((line, li) => {
      textG.append('text')
        .text(line)
        .attr('y', (li - (ninfo.lines.length - 1) / 2) * (FS * 1.45))
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', FS + 'px')
        .attr('font-weight', n.shape === 'terminal' ? '700' : '500')
        .attr('fill', pal.text)
        .attr('font-family', "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
    });

    // ── Hover glow + click ─────────────────────────────────────────────────
    const shape = g.select(n.shape === 'diamond' ? 'polygon' : 'rect');
    g.style('cursor', 'pointer')
     .on('mouseenter', () => shape.attr('filter', 'url(#glow)').attr('stroke-width', 2.2))
     .on('mouseleave', () => shape.attr('filter', null).attr('stroke-width', 1.5))
     .on('click', function(event) {
        event.stopPropagation();
        showInfo(n);
      });
  });

  setTimeout(fitAll, 60);
}
